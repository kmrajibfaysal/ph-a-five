<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issues Tracker</title>

    <!-- fontawesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Tailwindcss & Daisyui CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-gray-50">
    <div
      class="min-h-screen flex flex-col items-center justify-center py-6 px-4"
    >
      <div class="max-w-[480px] w-full">
        <div
          class="p-6 sm:p-8 rounded-2xl bg-white border border-gray-200 shadow-sm"
        >
          <div class="flex items-center justify-center">
            <img
              width="100px"
              height="100px"
              src="./assets/github-logo.png"
              alt=""
            />
          </div>
          <h1 class="text-slate-900 text-center text-3xl font-semibold">
            GitHub Issues Tracker
          </h1>
          <p class="text-gray-400 text-sm text-center">
            Sign in to manage your issues
          </p>
          <form class="mt-12 space-y-6">
            <div>
              <label class="text-slate-900 text-sm font-medium mb-2 block"
                >User name</label
              >
              <div class="relative flex items-center">
                <input
                  name="username"
                  type="text"
                  required
                  class="w-full text-slate-900 text-sm border border-slate-300 px-4 py-3 pr-8 rounded-md outline-blue-600"
                  placeholder="Enter user name"
                />
              </div>
            </div>
            <div>
              <label class="text-slate-900 text-sm font-medium mb-2 block"
                >Password</label
              >
              <div class="relative flex items-center">
                <input
                  name="password"
                  type="password"
                  required
                  class="w-full text-slate-900 text-sm border border-slate-300 px-4 py-3 pr-8 rounded-md outline-blue-600"
                  placeholder="Enter password"
                />
              </div>
            </div>
            <div class="flex flex-wrap items-center justify-between gap-4">
              <div class="flex items-center">
                <input
                  id="remember-me"
                  name="remember-me"
                  type="checkbox"
                  class="h-4 w-4 shrink-0 text-blue-600 focus:ring-blue-500 border-slate-300 rounded"
                />
                <label
                  for="remember-me"
                  class="ml-3 block text-sm text-slate-900"
                >
                  Remember me
                </label>
              </div>
              <div class="text-sm">
                <a
                  href="jajvascript:void(0);"
                  class="text-blue-600 hover:underline font-semibold"
                >
                  Forgot your password?
                </a>
              </div>
            </div>

            <div class="mt-12">
              <button
                type="button"
                class="w-full py-2 px-4 text-[15px] font-medium tracking-wide rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none cursor-pointer"
              >
                Sign in
              </button>
            </div>
            <div>
              <div class="flex items-center my-4">
                <hr class="grow border-t border-gray-300" />
                <span class="px-3 text-gray-700 text-sm">OR</span>
                <hr class="grow border-t border-gray-300" />
              </div>
            </div>
            <p class="text-gray-400 text-sm mt-6 text-center">
              Demo Credentials:
            </p>
            <p class="my-0 text-center">
              <span class="font-semibold">Username:</span>admin
            </p>
            <p class="my-0 text-center">
              <span class="font-semibold">Password:</span>admin123
            </p>
          </form>
        </div>
      </div>
    </div>

    <!-- js -->
    <script src="./login.js"></script>
  </body>
</html>
