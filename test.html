<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Issue Tracker</title>
    <style>
      .buttons {
        display: flex;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .buttons button {
        padding: 0.5rem 1rem;
        border: 1px solid #ccc;
        cursor: pointer;
      }
      .buttons button.active {
        background: purple;
        color: white;
      }
      .search {
        margin-bottom: 1rem;
      }
      .card {
        border: 1px solid #ddd;
        padding: 1rem;
        margin-bottom: 1rem;
        border-radius: 6px;
      }
      .priority {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="buttons">
      <button id="allBtn" class="active">All</button>
      <button id="openBtn">Open</button>
      <button id="closedBtn">Closed</button>
    </div>

    <div class="search">
      <input
        type="text"
        id="searchInput"
        placeholder="Search issues by title..."
      />
    </div>

    <div id="issuesContainer"></div>

    <script>
      const API_URL = 'https://phi-lab-server.vercel.app/api/v1/lab/issues';
      let issues = []; // all issues from API
      let currentFilter = 'all'; // current status filter
      let searchQuery = ''; // current search query

      // Fetch issues from API
      async function fetchIssues() {
        try {
          const res = await fetch(API_URL);
          const json = await res.json();
          issues = json.data; // array of issues
          renderIssues();
        } catch (err) {
          console.error('Error fetching issues:', err);
        }
      }

      // Render issues based on filter + search
      function renderIssues() {
        const container = document.getElementById('issuesContainer');
        container.innerHTML = '';

        let filtered = issues.filter((issue) => {
          // Filter by status
          if (currentFilter !== 'all' && issue.status !== currentFilter) {
            return false;
          }
          // Filter by search query
          if (
            searchQuery &&
            !issue.title.toLowerCase().includes(searchQuery.toLowerCase())
          ) {
            return false;
          }
          return true;
        });

        if (filtered.length === 0) {
          container.innerHTML = '<p>No issues found.</p>';
          return;
        }

        filtered.forEach((issue) => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
          <div class="priority">Priority: ${issue.priority.toUpperCase()}</div>
          <h3>${issue.title}</h3>
          <p>${issue.description}</p>
          <p>Status: ${issue.status}</p>
          <p>Labels: ${issue.labels.join(', ')}</p>
          <small>#${issue.id} by ${issue.author} | ${new Date(issue.createdAt).toLocaleDateString()}</small>
        `;
          container.appendChild(card);
        });
      }

      // Button event listeners
      document.getElementById('allBtn').addEventListener('click', () => {
        currentFilter = 'all';
        setActive('allBtn');
        renderIssues();
      });
      document.getElementById('openBtn').addEventListener('click', () => {
        currentFilter = 'open';
        setActive('openBtn');
        renderIssues();
      });
      document.getElementById('closedBtn').addEventListener('click', () => {
        currentFilter = 'closed';
        setActive('closedBtn');
        renderIssues();
      });

      // Search input listener
      document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderIssues();
      });

      // Helper to highlight active button
      function setActive(activeId) {
        document
          .querySelectorAll('.buttons button')
          .forEach((btn) => btn.classList.remove('active'));
        document.getElementById(activeId).classList.add('active');
      }

      // Initial fetch
      fetchIssues();
    </script>
  </body>
</html>
