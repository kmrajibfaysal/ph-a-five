<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issues Tracker</title>

    <!-- fontawesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Tailwindcss & Daisyui CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="max-w-[1200px] mx-auto my-6">
    <header class="flex justify-between items-center flex-col sm:flex-row">
      <div class="flex items-center gap-1.5">
        <img width="36px" src="./assets/github-logo.png" alt="" />
        <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
      </div>
      <div class="flex">
        <div>
          <label class="input">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-5 h-5 text-gray-500"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 104.5 4.5a7.5 7.5 0 0012.15 12.15z"
              />
            </svg>
            <input type="text" placeholder="Search issues" required />
          </label>
        </div>
        <button
          class="py-2 px-4 text-[15px] font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none cursor-pointer ml-6"
        >
          <i class="fa-solid fa-plus"></i>
          New Issue
        </button>
      </div>
    </header>
    <main class="mt-24">
      <!-- .. -->
      <section class="buttons flex max-w-[400px] gap-x-1.5 mb-4 tabs">
        <button
          id="allBtn"
          class="flex-1 py-2 px-4 text-[15px] font-medium rounded-md text-gray-400 border border-gray-200 hover:bg-blue-700 hover:text-white cursor-pointer mx-1 active tab"
          data-tab="all"
        >
          All
        </button>
        <button
          id="openBtn"
          class="flex-1 py-2 px-4 text-[15px] font-medium rounded-md text-gray-400 border border-gray-200 hover:bg-blue-700 hover:text-white cursor-pointer mx-1 tab"
          data-tab="open"
        >
          Open
        </button>
        <button
          id="closedBtn"
          class="flex-1 py-2 px-4 text-[15px] font-medium rounded-md text-gray-400 border border-gray-200 hover:bg-blue-700 hover:text-white cursor-pointer mx-1 tab"
          data-tab="closed"
        >
          Closed
        </button>
      </section>
      <!-- .. -->
      <hr class="border-t border-gray-100" />
      <!-- .. -->
      <section class="my-4 flex justify-between">
        <div class="flex items-center gap-2.5">
          <div
            class="rounded-full bg-gray-100 flex justify-center items-center w-[50px] h-[50px]"
          >
            <img
              width="30px"
              height="30px"
              src="./assets/Aperture.png"
              alt=""
            />
          </div>
          <div>
            <h2 class="font-bold text-lg">50 Issues</h2>
            <p class="text-sm text-gray-500">
              Track and manager your project issues
            </p>
          </div>
        </div>
        <div class="flex gap-4 font-semibold">
          <p class="flex items-center gap-1.5">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4 text-green-500"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <circle cx="12" cy="12" r="10" />
            </svg>
            Open
          </p>
          <p class="flex items-center gap-1.5">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4 text-purple-500"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <circle cx="12" cy="12" r="10" />
            </svg>
            Closed
          </p>
        </div>
      </section>
      <!-- .. -->
      <hr class="border-t border-gray-100" />

      <!-- Cards -->
      <div id="issues-container" class="my-6 flex flex-wrap gap-4"></div>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
